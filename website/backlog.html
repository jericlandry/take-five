<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Five · Product Backlog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal-900: #04342C; --teal-800: #085041; --teal-600: #0F6E56;
    --teal-500: #1D9E75; --teal-300: #5DCAA5; --teal-100: #9FE1CB;
    --teal-50: #E1F5EE; --cream: #F9F6F0; --white: #FFFFFF;
    --gray-200: #E8E5DF; --gray-400: #B0ADA6; --gray-600: #6B6763; --text: #1A1A18;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--teal-800);
    padding: 1.5rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(93,202,165,0.2);
  }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .brand-logo { width: 28px; height: 28px; }
  .brand-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--white); }
  .brand-sep { color: rgba(93,202,165,0.4); margin: 0 0.5rem; }
  .brand-page { font-size: 0.8rem; font-weight: 400; color: var(--teal-100); letter-spacing: 0.08em; text-transform: uppercase; }
  .header-meta { font-size: 0.78rem; color: var(--teal-100); opacity: 0.6; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 65px); }

  /* SIDEBAR */
  aside {
    background: var(--teal-900);
    padding: 2rem 1.25rem;
    position: sticky;
    top: 0;
    height: calc(100vh - 65px);
    overflow-y: auto;
    border-right: 1px solid rgba(93,202,165,0.1);
  }
  .sidebar-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--teal-300);
    margin-bottom: 1rem;
  }
  .nav-group { margin-bottom: 1.75rem; }
  .nav-group-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal-100);
    opacity: 0.5;
    margin-bottom: 0.5rem;
    padding-left: 0.5rem;
  }
  .nav-item {
    display: block;
    padding: 0.45rem 0.7rem;
    border-radius: 6px;
    font-size: 0.88rem;
    color: var(--teal-100);
    text-decoration: none;
    line-height: 1.4;
    transition: background 0.15s, color 0.15s;
    margin-bottom: 0.2rem;
  }
  .nav-item:hover { background: rgba(93,202,165,0.1); color: var(--white); }
  .nav-item .rice {
    display: inline-block;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--teal-300);
    margin-left: 0.35rem;
  }

  /* MAIN */
  main { padding: 2.5rem 3rem; max-width: 860px; }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--teal-500);
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--teal-800);
  }
  .section-note {
    font-size: 0.85rem;
    color: var(--gray-600);
    font-style: italic;
  }

  /* ITEM CARDS */
  .item-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 14px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.25rem;
    border-left: 3px solid var(--teal-500);
    transition: box-shadow 0.2s;
  }
  .item-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
  .item-card.infrastructure { border-left-color: var(--gray-400); }
  .item-card.philosophy { border-left-color: var(--teal-300); background: var(--teal-50); }

  .item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem; }
  .item-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--teal-800);
    line-height: 1.3;
  }
  .rice-badge {
    flex-shrink: 0;
    background: var(--teal-800);
    color: var(--teal-300);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 0.3rem 0.75rem;
    border-radius: 100px;
    white-space: nowrap;
  }
  .rice-badge.unscored { background: var(--gray-200); color: var(--gray-600); }

  .item-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
  .tag {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.25rem 0.65rem;
    border-radius: 100px;
    background: var(--teal-50);
    color: var(--teal-800);
  }
  .tag.eden { background: rgba(29,158,117,0.12); color: var(--teal-700, #0a5c42); }

  .rice-components {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--gray-600);
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }
  .rice-components span { color: var(--teal-600); font-weight: 700; }

  /* MARKDOWN CONTENT */
  .item-body { font-size: 1rem; line-height: 1.8; color: var(--text); }
  .item-body p { margin-bottom: 0.75rem; }
  .item-body p:last-child { margin-bottom: 0; }
  .item-body strong { color: var(--teal-900); font-weight: 700; }
  .item-body em { font-style: italic; }
  .item-body ul { padding-left: 1.25rem; margin-bottom: 0.75rem; }
  .item-body li { margin-bottom: 0.3rem; }
  .item-body code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--teal-50);
    color: var(--teal-800);
    padding: 0.15em 0.4em;
    border-radius: 4px;
  }
  .item-body h4 {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    color: var(--teal-800);
    margin: 1rem 0 0.4rem;
  }

  /* SECTION SPACING */
  .backlog-section { margin-bottom: 3rem; }

  /* COLLAPSIBLE SECTIONS */
  .section-details { }
  .section-header.collapsible {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--teal-500);
    user-select: none;
  }
  .section-header.collapsible::-webkit-details-marker { display: none; }
  .section-title.collapsible-title::before {
    content: '▸';
    display: inline-block;
    margin-right: 0.5rem;
    color: var(--teal-500);
    transition: transform 0.2s;
    font-size: 0.9em;
  }
  .section-details[open] .section-title.collapsible-title::before { transform: rotate(90deg); }
  .toggle-icon {
    margin-left: auto;
    font-size: 1.2rem;
    color: var(--teal-500);
    transition: transform 0.2s;
    line-height: 1;
  }
  .section-details[open] .toggle-icon { transform: rotate(90deg); }
  .section-details[open] summary { margin-bottom: 1.5rem; }
  .section-body { }

  /* COLLAPSIBLE RICE BREAKDOWN */
  .rice-details { margin-bottom: 1rem; }
  .rice-summary {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--teal-500);
    cursor: pointer;
    list-style: none;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    user-select: none;
  }
  .rice-summary::-webkit-details-marker { display: none; }
  .rice-summary::before { content: '›'; font-size: 1rem; transition: transform 0.15s; display: inline-block; }
  .rice-details[open] .rice-summary::before { transform: rotate(90deg); }
  .rice-details .rice-components { margin-top: 0.5rem; margin-bottom: 0; }

  /* LOADING / ERROR */
  .state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--gray-400);
  }
  .state-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--teal-800); margin-bottom: 0.5rem; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 1.5rem; }
    header { padding: 1rem 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="brand-logo" viewBox="0 0 56 56" fill="none">
      <g stroke="#1D9E75" stroke-width="1.5" fill="none">
        <line x1="28" y1="6" x2="50" y2="21"/><line x1="50" y1="21" x2="42" y2="47"/>
        <line x1="42" y1="47" x2="14" y2="47"/><line x1="14" y1="47" x2="6" y2="21"/>
        <line x1="6" y1="21" x2="28" y2="6"/>
      </g>
      <circle cx="28" cy="6" r="5" fill="#5DCAA5"/>
      <circle cx="50" cy="21" r="5" fill="#5DCAA5"/>
      <circle cx="42" cy="47" r="5" fill="#5DCAA5"/>
      <circle cx="14" cy="47" r="5" fill="#5DCAA5"/>
      <circle cx="6" cy="21" r="5" fill="#5DCAA5"/>
      <circle cx="28" cy="28" r="6" fill="#085041" stroke="#5DCAA5" stroke-width="1.5"/>
    </svg>
    <span class="brand-name">Take Five</span>
    <span class="brand-sep">·</span>
    <span class="brand-page">Product Backlog</span>
  </div>
  <div class="header-meta" id="last-updated"></div>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-label">Navigate</div>
    <div id="nav-content"></div>
  </aside>

  <main id="main-content">
    <div class="state">
      <div class="state-title">Loading backlog…</div>
    </div>
  </main>
</div>

<script>
// ── Item definitions parsed from BACKLOG.md structure ──────────────────────

const BACKLOG_URL = '/backlog.md';

// Parse markdown into structured sections and items
function parseBacklog(markdown) {
  const lines = markdown.split('\n');
  const sections = [];
  let currentSection = null;
  let currentItem = null;
  let bodyLines = [];

  function flushItem() {
    if (currentItem) {
      currentItem.body = bodyLines.join('\n').trim();
      currentSection.items.push(currentItem);
      currentItem = null;
      bodyLines = [];
    }
  }

  function flushSection() {
    flushItem();
    if (currentSection) sections.push(currentSection);
    currentSection = null;
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // H2 = section
    if (line.startsWith('## ') && !line.startsWith('### ')) {
      flushSection();
      currentSection = {
        title: line.replace('## ', '').trim(),
        note: '',
        items: []
      };
      continue;
    }

    // Blockquote under section = note
    if (line.startsWith('> ') && currentSection && !currentItem) {
      currentSection.note = line.replace('> ', '').trim();
      continue;
    }

    // H3 = item
    if (line.startsWith('### ')) {
      flushItem();
      if (!currentSection) currentSection = { title: 'General', note: '', items: [] };
      currentItem = {
        title: line.replace('### ', '').trim(),
        rice: null,
        riceComponents: null,
        edenDomains: [],
        tags: [],
        body: '',
        infrastructure: false,
        philosophy: false
      };
      continue;
    }

    if (!currentSection) continue;

    // Parse item metadata lines
    if (currentItem) {
      // RICE score line
      const riceMatch = line.match(/\*\*RICE:\s*([\d.]+)\*\*\s*·\s*(.+)/);
      if (riceMatch) {
        currentItem.rice = riceMatch[1];
        currentItem.riceComponents = riceMatch[2].trim();
        continue;
      }

      // Eden domains
      const edenMatch = line.match(/\*\*Eden domains:\*\*\s*(.+)/);
      if (edenMatch) {
        currentItem.edenDomains = edenMatch[1].split(',').map(d => d.trim());
        continue;
      }

      // Infrastructure / philosophy flags from title context
      if (currentItem.title.includes('Calendar') || currentItem.title.includes('Table')) {
        currentItem.infrastructure = true;
      }
      if (currentSection && currentSection.title.includes('Philosophy')) {
        currentItem.philosophy = true;
      }

      // Everything else is body
      bodyLines.push(line);
    }
  }

  flushSection();
  return sections;
}

function riceColor(score) {
  if (!score) return 'unscored';
  const n = parseFloat(score);
  if (n >= 1.5) return 'high';
  if (n >= 0.9) return 'mid';
  return 'low';
}

function renderItem(item) {
  const riceClass = item.rice ? riceColor(item.rice) : 'unscored';
  const cardClass = item.philosophy ? 'philosophy' : item.infrastructure ? 'infrastructure' : '';

  const riceBadge = item.rice
    ? `<div class="rice-badge">RICE ${item.rice}</div>`
    : `<div class="rice-badge unscored">Infrastructure</div>`;

  const riceComponents = item.riceComponents
    ? `<details class="rice-details"><summary class="rice-summary">Score breakdown</summary><div class="rice-components">${item.riceComponents.replace(/([\d.]+%?)/g, '<span>$1</span>')}</div></details>`
    : '';

  const edenTags = item.edenDomains.length
    ? item.edenDomains.map(d => `<span class="tag eden">${d}</span>`).join('')
    : '';

  const bodyHtml = item.body ? marked.parse(item.body) : '';

  const slug = item.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');

  return `
    <div class="item-card ${cardClass}" id="${slug}">
      <div class="item-header">
        <div class="item-title">${item.title}</div>
        ${riceBadge}
      </div>
      ${edenTags ? `<div class="item-meta">${edenTags}</div>` : ''}
      ${riceComponents}
      <div class="item-body">${bodyHtml}</div>
    </div>
  `;
}

function renderNav(sections) {
  return sections.map(section => {
    const items = section.items.map(item => {
      const slug = item.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const rice = item.rice ? `<span class="rice">${item.rice}</span>` : '';
      return `<a href="#${slug}" class="nav-item">${item.title}${rice}</a>`;
    }).join('');
    const sectionSlug = section.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    return `
      <div class="nav-group">
        <div class="nav-group-title">${section.title}</div>
        ${items}
      </div>
    `;
  }).join('');
}

function renderSections(sections) {
  return sections.map(section => {
    const items = section.items.map(renderItem).join('');
    const note = section.note ? `<span class="section-note">${section.note}</span>` : '';
    const isCollapsible = section.title.includes('Philosophy') || section.title.includes('RICE');
    if (isCollapsible) {
      return `
        <div class="backlog-section">
          <details class="section-details">
            <summary class="section-header collapsible">
              <h2 class="section-title collapsible-title">${section.title}</h2>
              ${note}
            </summary>
            <div class="section-body">${items}</div>
          </details>
        </div>
      `;
    }
    return `
      <div class="backlog-section">
        <div class="section-header">
          <h2 class="section-title">${section.title}</h2>
          ${note}
        </div>
        ${items}
      </div>
    `;
  }).join('');
}

// ── Boot ───────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch(BACKLOG_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const markdown = await res.text();

    // Extract last updated from first lines
    const updatedMatch = markdown.match(/Last updated:\s*(.+)/);
    if (updatedMatch) {
      document.getElementById('last-updated').textContent = `Last updated: ${updatedMatch[1].trim()}`;
    }

    const sections = parseBacklog(markdown);

    document.getElementById('nav-content').innerHTML = renderNav(sections);
    document.getElementById('main-content').innerHTML = renderSections(sections);

  } catch (err) {
    document.getElementById('main-content').innerHTML = `
      <div class="state">
        <div class="state-title">Couldn't load backlog</div>
        <p>Make sure backlog.md is in the same directory as this file.</p>
        <p style="margin-top:0.5rem;font-size:0.8rem;color:#B0ADA6;">${err.message}</p>
      </div>
    `;
  }
}

init();
</script>
</body>
</html>
